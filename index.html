<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mini Discord</title>
  <style>
    body {
      background-color: #313338; /* Цвет фона Discord */
      color: #dbdee1;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }
    .container {
      background-color: #2b2d31;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      text-align: center;
      width: 90%;
      max-width: 600px;
    }
    h1 {
      margin-top: 0;
      color: #fff;
    }
    .video-container {
      background-color: #111214;
      width: 100%;
      height: 300px;
      border-radius: 8px;
      margin: 20px 0;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }
    video {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    .placeholder-text {
      position: absolute;
      color: #949ba4;
    }
    .controls {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }
    button {
      background-color: #5865f2; /* Синий цвет кнопок Discord */
      color: white;
      border: none;
      padding: 12px 20px;
      font-size: 14px;
      font-weight: bold;
      border-radius: 3px;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    button:hover {
      background-color: #4752c4;
    }
    button.active {
      background-color: #248046; /* Зеленый при включении */
    }
    button.danger {
      background-color: #da373c; /* Красный */
    }
    button.danger:hover {
      background-color: #a92b2f;
    }
    #status {
      margin-top: 15px;
      font-size: 14px;
      color: #949ba4;
    }
  </style>
  <!-- Подключаем Socket.io клиент -->
  <script src="/socket.io/socket.io.js"></script>
</head>
<body>

  <div class="container">
    <h1>Mini Discord Call</h1>
    
    <div class="video-container">
      <span class="placeholder-text" id="videoPlaceholder">Экран собеседника появится здесь</span>
      <video id="remoteVideo" autoplay playsinline></video>
    </div>

    <div class="controls">
      <button id="btnConnect">Подключиться к связи</button>
      <button id="btnMute" class="danger" style="display:none;">Выкл. Микрофон</button>
      <button id="btnNoise" class="active" style="display:none;">Шумоподавление: ВКЛ</button>
      <button id="btnScreen" style="display:none;">Транслировать экран</button>
    </div>

    <div id="status">Статус: Ожидание подключения...</div>
  </div>

  <script src="script.js"></script>
</body>
</html>
